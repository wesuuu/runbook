<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — Trellis Runbook</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Sans', system-ui, sans-serif;
            background: hsl(40, 25%, 97%);
            color: hsl(220, 25%, 12%);
            padding: 2rem;
        }
        .container {
            text-align: center;
            max-width: 400px;
        }
        .icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 1.5rem;
            background: hsl(220, 60%, 28%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon span {
            font-family: monospace;
            font-size: 28px;
            font-weight: 600;
            color: hsl(40, 30%, 97%);
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }
        p {
            color: hsl(220, 10%, 46%);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        button {
            padding: 0.625rem 1.5rem;
            background: hsl(220, 60%, 28%);
            color: hsl(40, 30%, 97%);
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon"><span>R</span></div>
        <h1>You're offline</h1>
        <p>This page isn't available offline. Check your connection and try again.</p>
        <button onclick="window.location.reload()">Retry</button>
    </div>
</body>
</html>
